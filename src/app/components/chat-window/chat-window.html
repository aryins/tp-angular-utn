
    <div class="chat-container">
      <div class="messages-log">
        @for (msg of messages(); track msg.timestamp) {
          <div [class]="'message ' + msg.sender">
            <p>{{ msg.text }}</p>
            <small>{{ msg.timestamp | date:'shortTime' }}</small>
          </div>
        }
      </div>

      <footer class="input-area">
        <input [formControl]="messageControl" (keyup.enter)="sendMessage()" placeholder="Escribe un mensaje...">
        <button (click)="sendMessage()" [disabled]="messageControl.invalid">Enviar</button>
      </footer>
    </div>
