<aside class="sidebar">
  <header class="sidebar-header">
    <h2>Chats</h2>
    <a routerLink="/nuevo" class="btn-new-chat">+ Nuevo Chat</a>
  </header>

  <div class="chat-list">
    @for (chat of chatService.chats(); track chat.id) {
      <a 
        [routerLink]="['/chats', chat.id]" 
        routerLinkActive="active-chat"
        class="chat-item"
      >
        <img [src]="chat.avatar" [alt]="chat.contactName" class="avatar">
        <div class="chat-info">
          <span class="contact-name">{{ chat.contactName }}</span>
          <span class="status" [class]="chat.status">
            @if (chat.status === 'online') {
              En línea
            } @else {
              {{ chat.status }}
            }
          </span>
        </div>
      </a>
    }
  </div>
</aside>
